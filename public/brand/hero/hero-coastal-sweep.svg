<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720" role="img" aria-label="Primy coastal sweep">
  <title>Primy coastal sweep</title>
  <defs>
    <linearGradient id="cs-dome" x1="0.2" y1="0" x2="0.4" y2="1">
      <stop offset="0%" stop-color="#3C6CE0"/>
      <stop offset="58%" stop-color="#5C8CEF"/>
      <stop offset="100%" stop-color="#EBF1FD"/>
    </linearGradient>
    <linearGradient id="cs-ridge" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#F0896A"/>
      <stop offset="52%" stop-color="#F4A24C"/>
      <stop offset="100%" stop-color="#F8BE45"/>
    </linearGradient>
    <linearGradient id="cs-ridge2" x1="0" y1="1" x2="1" y2="0.2">
      <stop offset="0%" stop-color="#F6B27E"/>
      <stop offset="100%" stop-color="#FBD580"/>
    </linearGradient>
    <linearGradient id="cs-water" x1="0" y1="0" x2="0.1" y2="1">
      <stop offset="0%" stop-color="#4E92DB"/>
      <stop offset="100%" stop-color="#DEEAF8"/>
    </linearGradient>
    <linearGradient id="cs-lake" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#FCF6E0"/>
      <stop offset="100%" stop-color="#F6E9C2"/>
    </linearGradient>
    <clipPath id="cs-frame"><rect x="0" y="0" width="1280" height="720" rx="28"/></clipPath>
  </defs>

  <rect x="0" y="0" width="1280" height="720" rx="28" fill="#FFFFFF"/>
  <g clip-path="url(#cs-frame)">
    <!-- back ridge, behind the sun -->
    <path d="M0 470 C 240 432 520 470 760 432 C 1000 394 1140 430 1280 408 L1280 720 L0 720 Z" fill="url(#cs-ridge2)"/>
    <!-- sun low on the left -->
    <circle cx="300" cy="610" r="248" fill="url(#cs-dome)"/>
    <!-- main ridge sweeping up to the right -->
    <path d="M0 612 C 220 560 360 556 540 524 C 820 474 1040 506 1280 452 L1280 720 L0 720 Z" fill="url(#cs-ridge)"/>
    <!-- foreground water -->
    <path d="M0 700 C 360 652 820 666 1280 628 L1280 720 L0 720 Z" fill="url(#cs-water)"/>

    <!-- lake glinting below the sun -->
    <ellipse cx="320" cy="648" rx="176" ry="38" fill="#69CEC8" opacity="0.82"/>
    <ellipse cx="380" cy="636" rx="134" ry="26" fill="url(#cs-lake)" transform="rotate(-6 380 636)"/>

    <!-- twinkle constellation, upper right -->
    <g fill="#1A1815">
      <circle cx="1040" cy="196" r="6"/>
      <circle cx="1116" cy="172" r="6"/>
      <circle cx="966" cy="232" r="4"/>
    </g>

    <!-- orbit balloon, upper right -->
    <g fill="none" stroke="#1A1815" stroke-width="3.4" stroke-linecap="round">
      <path d="M884 452 L884 296"/>
      <circle cx="856" cy="254" r="50" stroke-opacity="0.92"/>
      <circle cx="920" cy="294" r="34" stroke-opacity="0.92"/>
    </g>
  </g>
</svg>
